name: Backend → EKS Deploy

on:
  push:
    # branches: [main]
    branches: ["main"]
  workflow_dispatch:

# ──────────────────────────────────────────────────────────────────────────
# 이 repo의 GitHub Secrets에 등록할 값:
#   AWS_ACCESS_KEY_ID          IAM 액세스 키
#   AWS_SECRET_ACCESS_KEY      IAM 시크릿 키
#   ECR_BACKEND_URI            terraform output -raw ecr_backend_repository_url
#   EKS_CLUSTER_NAME           terraform output -raw eks_cluster_name
#   BACKEND_SA_ROLE_ARN        terraform output -raw backend_sa_role_arn
#   S3_BUCKET_NAME             (필수) S3 버킷 이름 — deploy 시 manifests에 주입됨
# ──────────────────────────────────────────────────────────────────────────

env:
  AWS_REGION: ap-northeast-2

jobs:
  build:
    name: Build Backend (no deploy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Gradle Build
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

  deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Gradle Build
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
 
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker Build & Push
        env:
          ECR: ${{ secrets.ECR_BACKEND_URI }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR:$TAG -t $ECR:latest .
          docker push $ECR:$TAG
          docker push $ECR:latest

      - name: Checkout Infra Repository
        uses: actions/checkout@v3
        with:
          repository: Miniproject-management/management-infra # 👈 사용자님의 인프라 저장소
          token: ${{ secrets.GH_TOKEN }}   # 인프라 저장소 푸시 권한이 있는 PAT
          path: infra-repo 
      - name: Update Manifest
        env:
          ECR_IMAGE: ${{ secrets.ECR_BACKEND_URI }}:${{ github.sha }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          cd infra-repo
          if [ -z "${S3_BUCKET_NAME}" ]; then
            echo "GitHub Repository secret S3_BUCKET_NAME 이 비어 있습니다. 설정 후 다시 실행하세요."
            exit 1
          fi
          # infra/manifests/backend/deployment.yaml 내의 image: 부분을 새 이미지 태그로 변경
          sed -i "s|image: .*|image: ${ECR_IMAGE}|g" manifests/backend/deployment.yaml
          # S3 버킷명은 Kubernetes가 해석하지 않으므로, CI에서 시크릿 값으로 한 줄 덮어쓰기
          sed -i "s|^  S3_BUCKET_NAME:.*|  S3_BUCKET_NAME: \"${S3_BUCKET_NAME}\"|" manifests/backend/deployment.yaml
      - name: Commit and Push Changes
        run: |
          cd infra-repo
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add manifests/backend/deployment.yaml
          
          # 변경사항이 있는 경우에만 커밋 및 푸시
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: update backend image to ${{ github.sha }} [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi
        
