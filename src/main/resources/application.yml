server:
  port: 8080

spring:
  application:
    name: mini-3-back

  datasource:
    url: jdbc:mariadb://localhost:3306/mini3?serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

cloud:
  aws:
    region: us-east-2 #수정 필요
    s3:
      bucket: ${S3_BUCKET_NAME:awslab2026-bucket-test}
