server:
  port: 8080

spring:
  application:
    name: mini-3-back

  datasource:
    url: jdbc:mysql://miniproject-management-yhj-mysql-2team.crwisa8imi16.ap-southeast-2.rds.amazonaws.com:3306/mydb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.mariadb.jdbc.Driver
 
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false
 
  ai:
    google:
      genai:
        api-key: ${GOOGLE_API_KEY:}

# Gemini 이력서 분석 (Google AI Studio API 키 → spring.ai.google.genai.api-key 와 동일 변수 사용)
# gemini-1.5-flash 는 일부 키/지역에서 404(NOT_FOUND) — 필요 시 GEMINI_MODEL 로 재정의
app:
  gemini:
    model: ${GEMINI_MODEL:gemini-2.5-flash}

cloud:
  aws:
    region: ap-southeast-2 #수정 필요
    s3:
      bucket: miniproject-management-yhj-dev-files-804540872991

# ATS 전용 서버(document-analyzer) 주소. 백엔드가 /api/hr/applicants·/api/public/applications 요청을 여기로 그대로 넘김(프록시).
# Postman 은 예전처럼 백엔드 URL만 쓰면 됨. 클러스터 밖에서 끄려면 DOCUMENT_ANALYZER_PROXY_ENABLED=false
integration:
  document-analyzer:
    enabled: ${DOCUMENT_ANALYZER_PROXY_ENABLED:true}
    base-url: ${DOCUMENT_ANALYZER_BASE_URL:http://document-analyzer-service.miniproject-management.svc.cluster.local:8080}
    connect-timeout-ms: ${DOCUMENT_ANALYZER_CONNECT_TIMEOUT_MS:10000}
    read-timeout-ms: ${DOCUMENT_ANALYZER_READ_TIMEOUT_MS:180000}
