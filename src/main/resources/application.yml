server:
  port: 8080

spring:
  application:
    name: mini-3-back

  datasource:
    url: jdbc:mysql://miniproject-management-mysql-2team.c3owgi2swfvk.ap-northeast-2.rds.amazonaws.com:3306/mydb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.mariadb.jdbc.Driver
 
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  ai:
    google:
      genai:
        api-key: ${GOOGLE_API_KEY:}

# Gemini 이력서 분석 (Google AI Studio API 키 → spring.ai.google.genai.api-key 와 동일 변수 사용)
# gemini-1.5-flash 는 일부 키/지역에서 404(NOT_FOUND) — 필요 시 GEMINI_MODEL 로 재정의
app:
  gemini:
    model: ${GEMINI_MODEL:gemini-2.5-flash}

cloud:
  aws:
    region: ap-northeast-2 #수정 필요
    s3:
      bucket: miniproject-management-dev-files-804540872991
